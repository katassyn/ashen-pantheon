site_name: Ashen Pantheon
site_url: https://katassyn.github.io/ashen-pantheon/
repo_url: https://github.com/katassyn/ashen-pantheon
repo_name: katassyn/ashen-pantheon

theme:
  name: material
  logo: logo_256x256.png
  favicon: logo_256x256.png
  font:
    text: Inter
    code: JetBrains Mono
  palette:
    scheme: slate
    primary: black
    accent: amber
  features:
    - navigation.tabs
    - navigation.tabs.sticky
    - navigation.sections
    - navigation.top
    - navigation.instant
    - navigation.tracking
    - toc.follow
    - search.suggest
    - search.highlight
    - content.code.copy
    - content.tooltips
  icon:
    repo: fontawesome/brands/github

extra_css:
  - stylesheets/extra.css

extra:
  generator: false
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/katassyn/ashen-pantheon

markdown_extensions:
  - attr_list
  - md_in_html
  - tables
  - footnotes
  - admonition
  - def_list
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.keys
  - pymdownx.mark
  - pymdownx.caret
  - pymdownx.tilde
  - pymdownx.snippets

plugins:
  - search
  - tags
  - git-revision-date-localized:
      enable_creation_date: true
      fallback_to_build_date: true
  - minify:
      minify_html: true

nav:
  - Home: index.md
  - Game Overview: game-overview.md
  - Classes:
    - Overview: classes/index.md
    - Warrior: classes/warrior.md
    - Mage: classes/mage.md
    - Archer: classes/archer.md
  - Ascendancies:
    - Berserker: ascendancies/berserker.md
    - Guardian: ascendancies/guardian.md
    - Paladin: ascendancies/paladin.md
    - Elementalist: ascendancies/elementalist.md
    - Arcanist: ascendancies/arcanist.md
    - Hexblade: ascendancies/hexblade.md
    - Shadowstalker: ascendancies/shadowstalker.md
    - Beastmaster: ascendancies/beastmaster.md
    - Pathfinder: ascendancies/pathfinder.md
  - Systems:
    - Progression: systems/progression.md
    - Stats & Resistances: systems/stats-and-resistances.md
    - Skill Tree: systems/skill-tree.md
    - Ascendancy Tree: systems/ascendancy-tree.md
    - Skill Slots: systems/skill-slots.md
    - Instancing: systems/instancing.md
  - Bosses:
    - Overview: bosses/index.md
    - Boss Phases: bosses/boss-phases.md
  - World:
    - Overview: world/index.md
    - Maps: world/maps.md
  - Devlog:
    - Hub: devlog/index.md
    - "#002 — Stats System": devlog/002-stats-system.md
    - "#001 — The Beginning": devlog/001-the-beginning.md
  - Tags: tags.md
